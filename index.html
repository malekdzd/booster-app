<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0c0d10;
            --card-bg: #16171d;
            --text-color: #ffffff;
            --accent-color: #f7b500;
            --sub-text: #8b8e9b;
        }

        body { background: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .container { padding: 15px; }

        /* الأقسام المخفية */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* شريط علوي */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card-bg); border-bottom: 1px solid #2a2c35; }
        .profile-small { display: flex; align-items: center; gap: 10px; }
        .avatar-sm { width: 35px; height: 35px; border-radius: 50%; background: var(--accent-color); color: #000; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        .coins-pill { background: rgba(247, 181, 0, 0.1); border: 1px solid var(--accent-color); padding: 4px 12px; border-radius: 20px; color: var(--accent-color); font-weight: bold; }

        /* تصميم صفحة الحساب (Profile Page) */
        .profile-header { text-align: center; padding: 30px 0; background: linear-gradient(to bottom, #16171d, #0c0d10); }
        .avatar-lg { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent-color); margin: 0 auto 15px; display: flex; justify-content: center; align-items: center; font-size: 40px; background: #2a2c35; }
        .user-full-name { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        .user-handle { color: var(--sub-text); font-size: 14px; margin-bottom: 20px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid #2a2c35; text-align: center; }
        .stat-value { color: var(--accent-color); font-size: 18px; font-weight: bold; }
        .stat-label { color: var(--sub-text); font-size: 11px; margin-top: 5px; }

        /* تصميم البطاقات والقوائم */
        .card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #2a2c35; }
        .list-item { background: var(--card-bg); border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid #2a2c35; display: flex; align-items: center; justify-content: space-between; }
        
        /* شريط التنقل */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--card-bg); border-top: 1px solid #2a2c35; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: var(--sub-text); display: flex; flex-direction: column; align-items: center; font-size: 11px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--accent-color); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }

        button { background: var(--accent-color); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
