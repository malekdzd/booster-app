<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Booster Gold App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* تعريف الألوان الفاخرة */
        :root {
            --dark-blue: #040a1c;
            --gradient-bg: radial-gradient(circle at top, #0a1b3d 0%, #040a1c 100%);
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --gold-text: #d4af37;
            --card-bg: rgba(255, 255, 255, 0.04);
            --border: rgba(212, 175, 55, 0.2);
        }

        body {
            background: var(--dark-blue);
            background-image: var(--gradient-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            padding-bottom: 90px;
        }

        /* تصميم البطاقات */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        /* تصميم الأزرار الذهبية */
        .btn-gold {
            background: var(--gold-gradient);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-gold:active {
            transform: scale(0.96);
            box-shadow: 0 2px 10px rgba(212, 175, 55, 0.2);
        }

        /* نظام الألسنة (Tabs) في الأسفل */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: rgba(4, 10, 28, 0.95);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .tab-item {
            color: #7a7a7a;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-item.active {
            color: var(--gold-text);
            transform: translateY(-2px);
        }

        .tab-icon {
            font-size: 22px;
            margin-bottom: 3px;
        }

        /* إظهار وإخفاء الصفحات */
        .page {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--gold-text);
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--card-bg);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="user-header">
            <div class="avatar" id="avatar">?</div>
            <div>
                <div style="font-weight: bold;" id="name">جاري التحميل...</div>
                <div style="font-size: 12px; color: var(--gold-text);">عضو VIP</div>
            </div>
        </div>

        <div id="home-page" class="page active">
            <div class="card">
                <h2 style="color: var(--gold-text);">الرصيد الذهبي</h2>
                <div style="font-size: 32px; font-weight: bold; margin: 10px 0;">1,500 <span style="font-size: 18px;">BP</span></div>
                <button class="btn-gold" onclick="tg.showAlert('تم تفعيل التعدين!')">ابدأ التعدين</button>
            </div>
        </div>

        <div id="tasks-page" class="page">
            <h3>المهام اليومية</h3>
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div style="text-align: right;">
                    <div style="font-weight: bold;">متابعة X</div>
                    <small style="color: var(--gold-text);">+200 BP</small>
                </div>
                <button class="btn-gold" style="width: auto; padding: 5px 15px; font-size: 12px;">Go</button>
            </div>
        </div>

        <div id="profile-page" class="page">
            <div class="card">
                <h3>الإعدادات</h3>
                <p>اللغة: العربية</p>
                <button class="btn-gold" style="background: transparent; color: var(--gold-text); border: 1px solid var(--gold-text);" onclick="tg.close()">إغلاق التطبيق</button>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('home-page', this)">
            <span class="tab-icon">🏠</span>
            <span>الرئيسية</span>
        </div>
        <div class="tab-item" onclick="switchTab('tasks-page', this)">
            <span class="tab-icon">📋</span>
            <span>المهام</span>
        </div>
        <div class="tab-item" onclick="switchTab('profile-page', this)">
            <span class="tab-icon">👤</span>
            <span>حسابي</span>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // عرض بيانات المستخدم
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            let user = tg.initDataUnsafe.user;
            document.getElementById('name').innerText = user.first_name;
            document.getElementById('avatar').innerText = user.first_name[0];
        }

        function switchTab(pageId, el) {
            // إخفاء كل الصفحات
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // إظهار الصفحة المطلوبة
            document.getElementById(pageId).classList.add('active');

            // تغيير شكل الألسنة
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');

            // اهتزاز خفيف للهاتف
            tg.HapticFeedback.impactOccurred('light');
        }
    </script>
</body>
</html>
