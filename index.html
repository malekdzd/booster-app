<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booster Tasks</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <h1>مرحباً بك، <span id="username">المستخدم</span>!</h1>
        <div class="score-container">
            <p>رصيدك الحالي</p>
            <h2 id="balance">0</h2>
            <span>نقطة 💰</span>
        </div>
        
        <button id="main-button" onclick="mine()">اضغط لجمع النقاط 🚀</button>
        
        <div class="menu">
            <button onclick="showTab('tasks')">📋 المهام</button>
            <button onclick="showTab('friends')">👥 الأصدقاء</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById("username").innerText = tg.initDataUnsafe.user.first_name;

        let points = 0;
        function mine() {
            points += 1;
            document.getElementById("balance").innerText = points;
            tg.HapticFeedback.impactOccurred('medium'); // اهتزاز بسيط عند الضغط
        }
    </script>
</body>
</html>
