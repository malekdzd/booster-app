<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0c0d10; --card: #16171d; --text: #fff; --accent: #f7b500; --sub: #8b8e9b; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .container { padding: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .top-bar { display: flex; justify-content: space-between; padding: 15px; background: var(--card); border-bottom: 1px solid #2a2c35; }
        .coins { color: var(--accent); font-weight: bold; border: 1px solid var(--accent); padding: 2px 10px; border-radius: 20px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid #2a2c35; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2a2c35; }
        .nav-item { color: var(--sub); font-size: 11px; text-align: center; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        button { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        .lang-btn { background: #2a2c35; color: #fff; border: 1px solid #444; padding: 5px; border-radius: 5px; margin: 5px; cursor: pointer; width: 30%; }
        [dir="rtl"] { text-align: right; }
    </style>
</head>
<body>
    <div class="top-bar">
        <b id="app-name">BoosterTasks</b>
        <div class="coins">💰 <span id="balance">0</span></div>
    </div>

    <div class="container">
        <div id="tab-home" class="tab-content active">
            <div class="card">
                <h2 id="h-welcome">Welcome</h2>
                <p id="h-desc" style="color: var(--sub);">Earn points daily!</p>
            </div>
            <button onclick="switchTab('tasks')" id="h-btn">Start</button>
        </div>
        <div id="tab-tasks" class="tab-content">
            <h3 id="t-title">Tasks</h3>
            <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:10px;">
                <span id="t-name">Join Channel</span>
                <button onclick="doTask()" style="width:auto;">Check</button>
            </div>
        </div>
        <div id="tab-profile" class="tab-content">
            <div class="card" style="text-align:center;">
                <div id="u-init" style="width:60px; height:60px; background:var(--accent); border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; color:#000; font-weight:bold; font-size:24px;">?</div>
                <h3 id="u-name">User</h3>
                <div style="margin:10px 0;">
                    <button class="lang-btn" onclick="setLang('en')">EN</button>
                    <button class="lang-btn" onclick="setLang('ar')">AR</button>
                    <button class="lang-btn" onclick="setLang('ru')">RU</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home')" id="n-home">🏠<br><span id="l-home">Home</span></div>
        <div class="nav-item" onclick="switchTab('tasks')" id="n-tasks">📋<br><span id="l-tasks">Tasks</span></div>
        <div class="nav-item" onclick="switchTab('profile')" id="n-profile">👤<br><span id="l-profile">Profile</span></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let balance = localStorage.getItem('bal') || 0;
        let lang = localStorage.getItem('l') || 'en';

        const dict = {
            en: { w: "Welcome", d: "Earn points daily!", s: "Start", t: "Tasks", tn: "Join Channel", p: "Profile", h: "Home", dir: "ltr" },
            ar: { w: "مرحباً بك", d: "اجمع النقاط يومياً!", s: "ابدأ", t: "المهام", tn: "اشترك في القناة", p: "حسابي", h: "الرئيسية", dir: "rtl" },
            ru: { w: "Привет", d: "Зарабатывай баллы!", s: "Пуск", t: "Задания", tn: "Подписаться", p: "Профиль", h: "Главная", dir: "ltr" }
        };

        function setLang(l) {
            lang = l; localStorage.setItem('l', l);
            document.body.dir = dict[l].dir;
            document.getElementById('h-welcome').innerText = dict[l].w;
            document.getElementById('h-desc').innerText = dict[l].d;
            document.getElementById('h-btn').innerText = dict[l].s;
            document.getElementById('t-title').innerText = dict[l].t;
            document.getElementById('t-name').innerText = dict[l].tn;
            document.getElementById('l-home').innerText = dict[l].h;
            document.getElementById('l-tasks').innerText = dict[l].t;
            document.getElementById('l-profile').innerText = dict[l].p;
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('n-'+t).classList.add('active');
        }

        function doTask() {
            tg.openTelegramLink("https://t.me/RealProfitVault");
            setTimeout(() => { balance = parseInt(balance)+100; update(); }, 2000);
        }

        function update() {
            document.getElementById('balance').innerText = balance;
            localStorage.setItem('bal', balance);
            document.getElementById('u-name').innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('u-init').innerText = tg.initDataUnsafe.user.first_name[0];
        }

        setLang(lang); update();
    </script>
</body>
</html>
