<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

        .profile-header { text-align: center; padding: 20px 0; }

        .lang-btn.active { border-color: var(--accent-color); color: var(--accent-color); }
